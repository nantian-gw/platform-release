name: Nightly Conformance + Performance

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

env:
  GATEWAY_API_VERSION: v1.5.1
  CONTROLPLANE_IMAGE: ghcr.io/nantian-gw/nantian-controlplane:latest
  DATAPLANE_IMAGE: ghcr.io/nantian-gw/dataplane:latest
  DASHBOARD_IMAGE: ghcr.io/nantian-gw/dashboard:latest

jobs:
  conformance:
    name: Gateway API Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CLUSTER_NAME: nightly-conformance
      CONFORMANCE_EXPERIMENTAL: "true"
      ALL_FEATURES: "true"
    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
    steps:
      - uses: actions/checkout@v6
        with:
          repository: nantian-gw/gateway
          path: gateway

      - uses: actions/setup-go@v6
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum

      - name: Install Kind tooling
        working-directory: gateway
        run: scripts/ci/install-kind-tools.sh

      - name: Create kind cluster
        working-directory: gateway
        run: scripts/ci/create-kind-cluster.sh

      - name: Install Gateway API CRDs
        working-directory: gateway
        run: scripts/ci/install-gateway-api-crds.sh

      - name: Pull latest images
        run: |
          docker pull "${CONTROLPLANE_IMAGE}"
          docker pull "${DATAPLANE_IMAGE}"
          docker pull "${DASHBOARD_IMAGE}"

      - name: Load images into kind
        run: |
          kind load docker-image "${CONTROLPLANE_IMAGE}" --name "${CLUSTER_NAME}"
          kind load docker-image "${DATAPLANE_IMAGE}" --name "${CLUSTER_NAME}"
          kind load docker-image "${DASHBOARD_IMAGE}" --name "${CLUSTER_NAME}"

      - name: Deploy Nantian Gateway
        working-directory: gateway
        env:
          KIND_DATAPLANE_IMAGE: ${{ env.DATAPLANE_IMAGE }}
          KIND_DASHBOARD_IMAGE: ${{ env.DASHBOARD_IMAGE }}
        run: scripts/ci/deploy-kind-conformance.sh

      - name: Record image versions
        run: |
          echo "=== Images under test ==="
          kubectl get pods -n nantian-gw -o json | jq -r '.items[] | .spec.containers[] | "  \(.name): \(.image)"'
          echo "=== Image digests ==="
          kubectl get pods -n nantian-gw -o json | jq -r '.items[] | .status.containerStatuses[] | "  \(.name): \(.imageID)"'

      - name: Run conformance tests
        id: conformance
        working-directory: gateway
        run: |
          mkdir -p dist/conformance
          report_path="dist/conformance/report.yaml"

          args=(
            -gateway-class nantian-gw
            -report-output "$report_path"
            -organization "Nantian Gateway"
            -project "Nantian Gateway"
            -url "https://github.com/nantian-gw/gateway"
            -version nightly
            -contact "https://github.com/nantian-gw/gateway/issues"
          )

          run_test() {
            go test -tags=conformance -count=1 -v -timeout 30m ./conformance/ \
              -args "${args[@]}" 2>&1
          }

          retry_failed() {
            local log="$1"
            grep -E '^    --- FAIL:' "$log" | sed 's/    --- FAIL: //' | sed 's/ (.*//' | while read -r t; do
              echo "  Retrying: $t"
              go test -tags=conformance -count=1 -v -timeout 10m ./conformance/ \
                -run "^${t}$" \
                -args "${args[@]}" 2>&1
            done
          }

          set +e
          run_test | tee dist/conformance/run.log
          first_status=${PIPESTATUS[0]}

          for attempt in 1 2; do
            failed_count=$(grep -cE '^    --- FAIL:' dist/conformance/run.log 2>/dev/null || echo 0)
            if [[ "$failed_count" -eq 0 ]]; then
              break
            fi
            echo "=== Retry attempt $attempt ($failed_count failures) ===" | tee -a dist/conformance/run.log
            retry_failed dist/conformance/run.log | tee -a dist/conformance/run.log
          done

          status=${first_status}
          echo "exit_code=${status}" >>"${GITHUB_OUTPUT}"
          exit 0

      - name: Collect diagnostics on failure
        if: failure()
        working-directory: gateway
        run: ARTIFACT_DIR=tmp/conformance-diagnostics scripts/ci/collect-kind-diagnostics.sh

      - name: Upload conformance artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: conformance-results
          path: |
            gateway/dist/conformance/
            gateway/tmp/conformance-diagnostics/
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: command -v kind >/dev/null 2>&1 && kind delete cluster --name "$CLUSTER_NAME" || true

  performance:
    name: Dataplane Load Test
    needs: conformance
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLUSTER_NAME: nightly-perf
    steps:
      - uses: actions/checkout@v6
        with:
          repository: nantian-gw/gateway
          path: gateway

      - uses: actions/setup-go@v6
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum

      - name: Install Kind tooling
        working-directory: gateway
        run: scripts/ci/install-kind-tools.sh

      - name: Create kind cluster
        working-directory: gateway
        run: scripts/ci/create-kind-cluster.sh

      - name: Install Gateway API CRDs
        working-directory: gateway
        run: scripts/ci/install-gateway-api-crds.sh

      - name: Pull images
        run: |
          docker pull "${CONTROLPLANE_IMAGE}"
          docker pull "${DATAPLANE_IMAGE}"
          docker pull gcr.io/k8s-staging-gateway-api/echo-basic:v20260204-monthly-2026.01-60-g28382302
          docker pull peterevans/vegeta:latest

      - name: Load images into kind
        run: |
          kind load docker-image "${CONTROLPLANE_IMAGE}" --name "${CLUSTER_NAME}"
          kind load docker-image "${DATAPLANE_IMAGE}" --name "${CLUSTER_NAME}"
          kind load docker-image gcr.io/k8s-staging-gateway-api/echo-basic:v20260204-monthly-2026.01-60-g28382302 --name "${CLUSTER_NAME}"
          kind load docker-image peterevans/vegeta:latest --name "${CLUSTER_NAME}"

      - name: Deploy Nantian Gateway
        working-directory: gateway
        env:
          KIND_DATAPLANE_IMAGE: ${{ env.DATAPLANE_IMAGE }}
          KIND_DASHBOARD_IMAGE: ${{ env.DASHBOARD_IMAGE }}
        run: scripts/ci/deploy-kind-conformance.sh

      - name: Wait for gateway readiness
        run: |
          kubectl wait --for=condition=available --timeout=120s deployment -n nantian-gw --all
          kubectl get pods -n nantian-gw

      - name: Deploy backend + Gateway (multi-protocol)
        run: |
          ECHO="gcr.io/k8s-staging-gateway-api/echo-basic:v20260204-monthly-2026.01-60-g28382302"
          kubectl apply -f - <<YAML
          apiVersion: v1
          kind: Pod
          metadata: {name: perf-backend, namespace: nantian-gw, labels: {app: perf-backend}}
          spec:
            containers:
            - {name: echo, image: "${ECHO}", ports: [{containerPort: 3000}, {containerPort: 7070}]}
          ---
          apiVersion: v1
          kind: Service
          metadata: {name: perf-backend, namespace: nantian-gw}
          spec:
            selector: {app: perf-backend}
            ports:
            - {name: http, port: 3000, targetPort: 3000}
            - {name: grpc, port: 7070, targetPort: 7070}
          ---
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata: {name: perf-gw, namespace: nantian-gw}
          spec:
            gatewayClassName: nantian-gw
            listeners:
            - {name: http, port: 80,  protocol: HTTP}
            - {name: grpc, port: 7070, protocol: HTTP, allowedRoutes: {kinds: [{kind: "GRPCRoute"}]}}
          ---
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata: {name: perf-http, namespace: nantian-gw}
          spec:
            parentRefs: [{name: perf-gw, sectionName: http}]
            rules: [{backendRefs: [{name: perf-backend, port: 3000}]}]
          ---
          apiVersion: gateway.networking.k8s.io/v1
          kind: GRPCRoute
          metadata: {name: perf-grpc, namespace: nantian-gw}
          spec:
            parentRefs: [{name: perf-gw, sectionName: grpc}]
            rules: [{backendRefs: [{name: perf-backend, port: 7070}]}]
          YAML
          kubectl wait --for=condition=ready pod/perf-backend -n nantian-gw --timeout=60s

          for i in $(seq 1 30); do
            S=$(kubectl get gateway perf-gw -n nantian-gw -o json | jq -r '.status.conditions[]? | select(.type=="Programmed") | .status // ""')
            [[ "$S" == "True" ]] && break; sleep 2
          done
          kubectl get svc -n nantian-gw

      - name: Collect baseline metrics
        run: |
          kubectl top pod -n nantian-gw 2>/dev/null || echo "metrics not available"
          : > /tmp/cpu-mem-samples.json

      - name: Run vegeta warmup and 10-min measured load through dataplane
        id: vegeta
        run: |
          echo "=== Services ==="
          kubectl get svc -n nantian-gw
          echo "=== Endpoints ==="
          kubectl get endpoints -n nantian-gw

          GW_SVC=$(kubectl get svc -n nantian-gw -o json | jq -r '.items[] | select(.metadata.name | test("perf-gw")) | .metadata.name' | head -1)
          if [[ -z "${GW_SVC}" || "${GW_SVC}" == "null" ]]; then GW_SVC="nantian-gw-perf-gw"; fi
          echo "Target service: ${GW_SVC}"

          : > /tmp/cpu-mem-samples.json
          sample_from_kubectl_top() {
            kubectl top pod -n nantian-gw --no-headers 2>/dev/null |
              awk '/dataplane/ {print $1,$2,$3; exit}' |
              awk 'NF >= 3 {
                cpu=$2
                mem=$3
                gsub(/m$/, "", cpu)
                if (mem ~ /Ki$/) {
                  gsub(/Ki$/, "", mem)
                  mem=int(mem / 1024)
                } else if (mem ~ /Mi$/) {
                  gsub(/Mi$/, "", mem)
                } else if (mem ~ /Gi$/) {
                  gsub(/Gi$/, "", mem)
                  mem=int(mem * 1024)
                }
                print $1, int(cpu), int(mem)
              }'
          }

          dataplane_pod_info() {
            local info
            info=$(kubectl get pod -n nantian-gw -l app=nantian-gw-dataplane -o json 2>/dev/null |
              jq -r '.items[]? | select(.status.phase == "Running") | [.metadata.name, .spec.nodeName] | @tsv' |
              head -1)
            if [[ -n "${info}" ]]; then
              printf '%s\n' "${info}"
              return 0
            fi

            kubectl get pod -n nantian-gw -o json 2>/dev/null |
              jq -r '.items[]? | select(.status.phase == "Running") | select(.metadata.name | contains("dataplane")) | [.metadata.name, .spec.nodeName] | @tsv' |
              head -1
          }

          sample_from_kubelet_summary() {
            local info POD NODE
            info=$(dataplane_pod_info)
            if [[ -z "${info}" ]]; then
              return 1
            fi

            POD=$(echo "${info}" | awk '{print $1}')
            NODE=$(echo "${info}" | awk '{print $2}')
            if [[ -z "${POD}" || -z "${NODE}" ]]; then
              return 1
            fi

            kubectl get --raw "/api/v1/nodes/${NODE}/proxy/stats/summary" 2>/dev/null |
              jq -r --arg ns "nantian-gw" --arg pod "${POD}" '
                .pods[]?
                | select(.podRef.namespace == $ns and .podRef.name == $pod) as $pod_stats
                | [
                    $pod_stats.podRef.name,
                    ((($pod_stats.cpu.usageNanoCores // ([$pod_stats.containers[]?.cpu.usageNanoCores // 0] | add) // 0) / 1000000) | floor),
                    ((($pod_stats.memory.workingSetBytes // ([$pod_stats.containers[]?.memory.workingSetBytes // 0] | add) // 0) / 1048576) | floor)
                  ]
                | @tsv
              ' |
              head -1
          }

          capture_dataplane_sample() {
            local minute="$1"
            local source="kubectl-top"
            local sample POD CPU MEM

            sample=$(sample_from_kubectl_top || true)
            if [[ -z "${sample}" ]]; then
              source="kubelet-summary"
              sample=$(sample_from_kubelet_summary || true)
            fi

            if [[ -z "${sample}" ]]; then
              echo "t=${minute}min cpu/memory unavailable from kubectl top and kubelet summary"
              return 0
            fi

            read -r POD CPU MEM <<<"${sample}"
            if ! [[ "${CPU}" =~ ^[0-9]+$ && "${MEM}" =~ ^[0-9]+$ ]]; then
              echo "t=${minute}min invalid cpu/memory sample from ${source}: ${sample}"
              return 0
            fi

            echo "t=${minute}min source=${source} pod=${POD} cpu=${CPU}m mem=${MEM}Mi"
            printf '%s,\n' "$(jq -nc \
              --argjson minute "${minute}" \
              --arg source "${source}" \
              --arg pod "${POD}" \
              --argjson cpu_m "${CPU}" \
              --argjson mem_mi "${MEM}" \
              '{minute:$minute,source:$source,pod:$pod,cpu_m:$cpu_m,mem_mi:$mem_mi}')" >> /tmp/cpu-mem-samples.json
          }

          (
            for i in $(seq 0 11); do
              sleep 60
              capture_dataplane_sample "$i"
            done
          ) &
          METRICS_PID=$!

          kubectl run vegeta -n nantian-gw --image=peterevans/vegeta:latest --rm --attach --restart=Never -- \
            sh -c "printf 'GET http://${GW_SVC}/\n' > /tmp/targets && \
              echo 'Warmup: 60s' >&2 && \
              vegeta attack -duration=60s -rate=0 -max-workers=50 -targets=/tmp/targets >/tmp/vegeta-warmup.bin && \
              vegeta report /tmp/vegeta-warmup.bin >&2 && \
              echo 'Measurement: 10m' >&2 && \
              vegeta attack -duration=10m -rate=0 -max-workers=50 -targets=/tmp/targets | vegeta report -type=json" \
            > /tmp/vegeta-output.json 2>/tmp/vegeta-stderr.txt || true

          kill "${METRICS_PID}" 2>/dev/null || true
          wait "${METRICS_PID}" 2>/dev/null || true

          cat /tmp/vegeta-stderr.txt 2>/dev/null | tail -5 || true
          grep '^{' /tmp/vegeta-output.json > /tmp/vegeta-clean.json 2>/dev/null || true

      - name: Merge results
        run: |
          set +e
          SAMPLES=$(cat /tmp/cpu-mem-samples.json 2>/dev/null | sed '$ s/,$//')
          if [[ -z "${SAMPLES}" ]]; then
            SAMPLES="[]"
          else
            SAMPLES="[${SAMPLES}]"
          fi

          if [[ -s /tmp/vegeta-clean.json ]]; then
            REQS=$(jq -r '.requests // 0' /tmp/vegeta-clean.json)
            RATE=$(jq -r '.rate // 0' /tmp/vegeta-clean.json)
            SUCCESS=$(jq -r '.success // 0' /tmp/vegeta-clean.json)
            P50=$(jq -r '(.latencies."50th" // 0) / 1000000 | floor' /tmp/vegeta-clean.json)
            P90=$(jq -r '(.latencies."90th" // 0) / 1000000 | floor' /tmp/vegeta-clean.json)
            P95=$(jq -r '(.latencies."95th" // 0) / 1000000 | floor' /tmp/vegeta-clean.json)
            P99=$(jq -r '(.latencies."99th" // 0) / 1000000 | floor' /tmp/vegeta-clean.json)
            MAX=$(jq -r '(.latencies.max // 0) / 1000000 | floor' /tmp/vegeta-clean.json)
            MIN=$(jq -r '(.latencies.min // 0) / 1000000 | floor' /tmp/vegeta-clean.json)
            MEAN=$(jq -r '(.latencies.mean // 0) / 1000000 | floor' /tmp/vegeta-clean.json)
            BYTES_IN=$(jq -r '.bytes_in.total // 0' /tmp/vegeta-clean.json)
            BYTES_OUT=$(jq -r '.bytes_out.total // 0' /tmp/vegeta-clean.json)
            STATUS_CODES=$(jq -r '.status_codes // {}' /tmp/vegeta-clean.json)
            THROUGHPUT=$(jq -r '.throughput // 0' /tmp/vegeta-clean.json)
          else
            REQS=0; RATE=0; SUCCESS=0; P50=0; P90=0; P95=0; P99=0; MAX=0; MIN=0; MEAN=0
            BYTES_IN=0; BYTES_OUT=0; STATUS_CODES="{}"; THROUGHPUT=0
          fi

          CPU_AVG=0; CPU_MAX=0; MEM_AVG=0; MEM_MAX=0
          if [[ "${SAMPLES}" != "[]" ]]; then
            CPU_AVG=$(echo "${SAMPLES}" | jq '[.[].cpu_m] | add / length // 0' 2>/dev/null || echo 0)
            CPU_MAX=$(echo "${SAMPLES}" | jq '[.[].cpu_m] | max // 0' 2>/dev/null || echo 0)
            MEM_AVG=$(echo "${SAMPLES}" | jq '[.[].mem_mi] | add / length // 0' 2>/dev/null || echo 0)
            MEM_MAX=$(echo "${SAMPLES}" | jq '[.[].mem_mi] | max // 0' 2>/dev/null || echo 0)
          fi

          mkdir -p dist
          cat > dist/performance.json <<JSON
          {
            "tool": "vegeta",
            "target": "dataplane via Gateway",
            "warmup_sec": 60,
            "measurement_sec": 600,
            "duration_sec": 600,
            "total_requests": ${REQS},
            "rate_rps": ${RATE},
            "throughput_rps": ${THROUGHPUT},
            "success_rate": ${SUCCESS},
            "bytes_in": ${BYTES_IN},
            "bytes_out": ${BYTES_OUT},
            "status_codes": ${STATUS_CODES},
            "latency": {
              "min_ms": ${MIN},
              "p50_ms": ${P50},
              "p90_ms": ${P90},
              "p95_ms": ${P95},
              "p99_ms": ${P99},
              "max_ms": ${MAX},
              "mean_ms": ${MEAN}
            },
            "cpu": {
              "avg_m": ${CPU_AVG},
              "max_m": ${CPU_MAX}
            },
            "memory": {
              "avg_mi": ${MEM_AVG},
              "max_mi": ${MEM_MAX}
            },
            "cpu_mem_samples": ${SAMPLES}
          }
          JSON

          cat dist/performance.json

          if [[ -s /tmp/vegeta-clean.json ]]; then
            cp /tmp/vegeta-clean.json dist/vegeta-raw.json
          fi

      - name: Upload performance artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: performance-results
          path: |
            dist/performance.json
            dist/vegeta-raw.json
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: command -v kind >/dev/null 2>&1 && kind delete cluster --name "$CLUSTER_NAME" || true

  commit-results:
    name: Commit Results
    needs: [conformance, performance]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      - name: Download artifacts
        uses: actions/download-artifact@v7
        with:
          path: artifacts

      - name: Generate nightly results
        run: |
          DATE=$(date -u +%Y-%m-%d)
          RESULTS_DIR="results/nightly/${DATE}"
          mkdir -p "${RESULTS_DIR}"

          if [[ -d artifacts/conformance-results ]]; then
            find artifacts/conformance-results -type f -name '*.yaml' -o -name '*.log' | while read f; do
              cp "$f" "${RESULTS_DIR}/$(basename "$f")" 2>/dev/null || true
            done
          fi

          PERF_FILE=$(find artifacts/performance-results -name performance.json 2>/dev/null | head -1)
          if [[ -n "${PERF_FILE}" && -f "${PERF_FILE}" ]]; then
            cp "${PERF_FILE}" "${RESULTS_DIR}/performance.json"
          fi
          RAW_VEGETA=$(find artifacts/performance-results -name vegeta-raw.json 2>/dev/null | head -1)
          if [[ -n "${RAW_VEGETA}" && -f "${RAW_VEGETA}" ]]; then
            cp "${RAW_VEGETA}" "${RESULTS_DIR}/vegeta-raw.json"
          fi

          raw_files=""
          append_raw_file() {
            local file="$1"
            local description="$2"
            if [[ -f "${RESULTS_DIR}/${file}" ]]; then
              raw_files="${raw_files}- \`${file}\` — ${description}"$'\n'
            fi
          }
          append_raw_file "report.yaml" "Gateway API conformance report"
          append_raw_file "run.log" "Full conformance test output"
          append_raw_file "performance.json" "Vegeta dataplane load test summary"
          append_raw_file "vegeta-raw.json" "Raw vegeta latency distribution"
          if [[ -z "${raw_files}" ]]; then
            raw_files="- No raw data files were produced"$'\n'
          fi

          CONFORMANCE="no data"
          if [[ -f "${RESULTS_DIR}/run.log" ]]; then
            PASSED=$(grep -c -- '--- PASS:' "${RESULTS_DIR}/run.log" || echo "0")
            FAILED=$(grep -cE '^    --- FAIL:' "${RESULTS_DIR}/run.log" || echo "0")
            SKIPPED=$(grep -c -- '--- SKIP:' "${RESULTS_DIR}/run.log" || echo "0")
            CONFORMANCE="${PASSED} passed, ${FAILED} failed, ${SKIPPED} skipped"
          fi

          PERF="no data"
          if [[ -f "${RESULTS_DIR}/performance.json" ]]; then
            TOTAL=$(jq -r '.total_requests // "N/A"' "${RESULTS_DIR}/performance.json")
            RPS=$(jq -r '.rate_rps // "N/A"' "${RESULTS_DIR}/performance.json")
            P50=$(jq -r '.latency.p50_ms // "N/A"' "${RESULTS_DIR}/performance.json")
            P90=$(jq -r '.latency.p90_ms // "N/A"' "${RESULTS_DIR}/performance.json")
            P95=$(jq -r '.latency.p95_ms // "N/A"' "${RESULTS_DIR}/performance.json")
            P99=$(jq -r '.latency.p99_ms // "N/A"' "${RESULTS_DIR}/performance.json")
            MAX=$(jq -r '.latency.max_ms // "N/A"' "${RESULTS_DIR}/performance.json")
            MEAN=$(jq -r '.latency.mean_ms // "N/A"' "${RESULTS_DIR}/performance.json")
            PERF="${TOTAL} req @ ${RPS} RPS

          | Percentile | Latency |
          |-----------|---------|
          | p50       | ${P50}ms |
          | p90       | ${P90}ms |
          | p95       | ${P95}ms |
          | p99       | ${P99}ms |
          | max       | ${MAX}ms |
          | mean      | ${MEAN}ms |"
          fi

          cat > "${RESULTS_DIR}/summary.md" <<EOF
          # Nightly Test Results — ${DATE}

          | Test | Result |
          |------|--------|
          | Conformance | ${CONFORMANCE} |
          | Performance | ${PERF} |

          Images tested:
          - Control Plane: ${CONTROLPLANE_IMAGE}
          - Data Plane: ${DATAPLANE_IMAGE}

          ## Raw Data Files
          ${raw_files}
          EOF

          cat "${RESULTS_DIR}/summary.md"

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/nightly/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore(results): record nightly conformance + performance for ${DATE}"
          git push
