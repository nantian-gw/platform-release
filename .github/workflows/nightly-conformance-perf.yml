name: Nightly Conformance + Performance

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: write
  packages: read

env:
  GATEWAY_API_VERSION: v1.5.1
  CONTROLPLANE_IMAGE: ghcr.io/nantian-gw/nantian-controlplane:latest
  DATAPLANE_IMAGE: ghcr.io/nantian-gw/dataplane:latest-amd64
  DASHBOARD_IMAGE: ghcr.io/nantian-gw/dashboard:latest
  TIMEOUT: "600s"

jobs:
  conformance:
    name: Gateway API Conformance
    runs-on: ubuntu-latest
    timeout-minutes: 90
    env:
      CLUSTER_NAME: nightly-conformance
      CONFORMANCE_EXPERIMENTAL: "true"
      ALL_FEATURES: "true"
    outputs:
      passed: ${{ steps.conformance.outputs.passed }}
      failed: ${{ steps.conformance.outputs.failed }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: nantian-gw/gateway
          path: gateway

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum

      - name: Install Kind tooling
        working-directory: gateway
        run: scripts/ci/install-kind-tools.sh

      - name: Create kind cluster
        working-directory: gateway
        run: scripts/ci/create-kind-cluster.sh

      - name: Install Gateway API CRDs
        working-directory: gateway
        run: scripts/ci/install-gateway-api-crds.sh

      - name: Pull latest images
        run: |
          docker pull "${CONTROLPLANE_IMAGE}"
          docker pull "${DATAPLANE_IMAGE}"
          docker pull "${DASHBOARD_IMAGE}"

      - name: Load images into kind
        run: |
          kind load docker-image "${CONTROLPLANE_IMAGE}" --name "${CLUSTER_NAME}"
          kind load docker-image "${DATAPLANE_IMAGE}" --name "${CLUSTER_NAME}"
          kind load docker-image "${DASHBOARD_IMAGE}" --name "${CLUSTER_NAME}"

      - name: Deploy Nantian Gateway
        working-directory: gateway
        env:
          KIND_DATAPLANE_IMAGE: ${{ env.DATAPLANE_IMAGE }}
          KIND_DASHBOARD_IMAGE: ${{ env.DASHBOARD_IMAGE }}
        run: scripts/ci/deploy-kind-conformance.sh

      - name: Dataplane diagnostics (on deploy failure)
        if: failure()
        run: |
          echo "=== Dataplane pod status ==="
          kubectl get pods -n nantian-gw -l app=nantian-gw-dataplane -o wide 2>/dev/null || true
          echo "=== Dataplane pod describe ==="
          kubectl describe pod -n nantian-gw -l app=nantian-gw-dataplane 2>/dev/null || true
          echo "=== Dataplane pod logs (previous) ==="
          kubectl logs -n nantian-gw -l app=nantian-gw-dataplane --previous --tail=50 2>/dev/null || true
          echo "=== Dataplane pod logs (current) ==="
          kubectl logs -n nantian-gw -l app=nantian-gw-dataplane --tail=50 2>/dev/null || true
          echo "=== All pods ==="
          kubectl get pods -n nantian-gw -o wide 2>/dev/null || true

      - name: Record image versions
        run: |
          echo "=== Images under test ==="
          kubectl get pods -n nantian-gw -o json | jq -r '.items[] | .spec.containers[] | "  \(.name): \(.image)"'
          echo "=== Image digests ==="
          kubectl get pods -n nantian-gw -o json | jq -r '.items[] | .status.containerStatuses[] | "  \(.name): \(.imageID)"'

      - name: Run conformance tests
        id: conformance
        working-directory: gateway
        run: |
          mkdir -p dist/conformance
          report_path="dist/conformance/report.yaml"

          args=(
            -gateway-class nantian-gw
            -report-output "$report_path"
            -organization "Nantian Gateway"
            -project "Nantian Gateway"
            -url "https://github.com/nantian-gw/gateway"
            -version nightly
            -contact "https://github.com/nantian-gw/gateway/issues"
          )

          run_test() {
            go test -tags=conformance -count=1 -v -timeout 30m ./conformance/ \
              -args "${args[@]}" 2>&1
          }

          # Deduplicated first-level failing test names from a single log file.
          failed_tests() {
            grep -E '^    --- FAIL:' "$1" | sed -E 's/^    --- FAIL: //; s/ \(.*//' | sort -u
          }

          set +e
          # Authoritative full-suite pass. run.log is what drives the summary counts,
          # so it stays limited to this pass; the retry output goes to retry.log and
          # never inflates PASS/FAIL/SKIP.
          run_test | tee dist/conformance/run.log
          first_status=${PIPESTATUS[0]}

          # One batched retry of the failing tests only (shares a single suite setup
          # instead of paying it once per test). Retries surface flakes; deterministic
          # failures stay failing and are not re-run again.
          mapfile -t retry_list < <(failed_tests dist/conformance/run.log)
          if [[ ${#retry_list[@]} -gt 0 ]]; then
            parent="${retry_list[0]%%/*}"
            subs=()
            for t in "${retry_list[@]}"; do subs+=("${t#${parent}/}"); done
            run_re="^${parent}\$/^($(IFS='|'; echo "${subs[*]}"))\$"
            echo "=== Retry pass: ${#retry_list[@]} failure(s) in one batched run ==="
            echo "    tests: ${retry_list[*]}"
            go test -tags=conformance -count=1 -v -timeout 20m ./conformance/ \
              -run "${run_re}" \
              -args "${args[@]}" -report-output dist/conformance/retry-report.yaml 2>&1 \
              | tee dist/conformance/retry.log
            passed_on_retry=$(comm -23 \
              <(printf '%s\n' "${retry_list[@]}" | sort -u) \
              <(failed_tests dist/conformance/retry.log))
            if [[ -n "${passed_on_retry}" ]]; then
              echo "=== Passed on retry (flaky, not deterministic): ==="
              printf '  %s\n' ${passed_on_retry}
            fi
          fi

          status=${first_status}
          echo "exit_code=${status}" >>"${GITHUB_OUTPUT}"
          exit 0

      - name: Collect diagnostics on failure
        if: failure()
        working-directory: gateway
        run: ARTIFACT_DIR=tmp/conformance-diagnostics scripts/ci/collect-kind-diagnostics.sh

      - name: Upload conformance artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: conformance-results
          path: |
            gateway/dist/conformance/
            gateway/tmp/conformance-diagnostics/
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: command -v kind >/dev/null 2>&1 && kind delete cluster --name "$CLUSTER_NAME" || true

  performance:
    name: Dataplane Load Test
    needs: conformance
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      CLUSTER_NAME: nightly-perf
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10
        with:
          repository: nantian-gw/gateway
          path: gateway

      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        with:
          go-version-file: gateway/go.mod
          cache-dependency-path: gateway/go.sum

      - name: Install Kind tooling
        working-directory: gateway
        run: scripts/ci/install-kind-tools.sh

      - name: Create kind cluster
        working-directory: gateway
        run: scripts/ci/create-kind-cluster.sh

      - name: Install Gateway API CRDs
        working-directory: gateway
        run: scripts/ci/install-gateway-api-crds.sh

      - name: Pull images
        run: |
          docker pull "${CONTROLPLANE_IMAGE}"
          docker pull "${DATAPLANE_IMAGE}"
          docker pull gcr.io/k8s-staging-gateway-api/echo-basic:v20260204-monthly-2026.01-60-g28382302
          docker pull peterevans/vegeta:latest

      - name: Load images into kind
        run: |
          kind load docker-image "${CONTROLPLANE_IMAGE}" --name "${CLUSTER_NAME}"
          kind load docker-image "${DATAPLANE_IMAGE}" --name "${CLUSTER_NAME}"
          kind load docker-image gcr.io/k8s-staging-gateway-api/echo-basic:v20260204-monthly-2026.01-60-g28382302 --name "${CLUSTER_NAME}"
          kind load docker-image peterevans/vegeta:latest --name "${CLUSTER_NAME}"

      - name: Deploy Nantian Gateway
        working-directory: gateway
        env:
          KIND_DATAPLANE_IMAGE: ${{ env.DATAPLANE_IMAGE }}
          KIND_DASHBOARD_IMAGE: ${{ env.DASHBOARD_IMAGE }}
        run: scripts/ci/deploy-kind-conformance.sh

      - name: Wait for gateway readiness
        run: |
          kubectl wait --for=condition=available --timeout=120s deployment -n nantian-gw --all
          kubectl get pods -n nantian-gw

      - name: Deploy backend + Gateway (multi-path)
        run: |
          ECHO="gcr.io/k8s-staging-gateway-api/echo-basic:v20260204-monthly-2026.01-60-g28382302"
          kubectl apply -f - <<YAML
          apiVersion: v1
          kind: Pod
          metadata: {name: perf-backend, namespace: nantian-gw, labels: {app: perf-backend}}
          spec:
            securityContext:
              runAsNonRoot: true
              runAsUser: 65532
              seccompProfile: {type: RuntimeDefault}
            containers:
            - name: echo
              image: "${ECHO}"
              ports: [{containerPort: 3000}, {containerPort: 7070}]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: {drop: ["ALL"]}
          ---
          apiVersion: v1
          kind: Service
          metadata: {name: perf-backend, namespace: nantian-gw}
          spec:
            selector: {app: perf-backend}
            ports:
            - {name: http, port: 3000, targetPort: 3000}
            - {name: grpc, port: 7070, targetPort: 7070}
          ---
          apiVersion: gateway.networking.k8s.io/v1
          kind: Gateway
          metadata: {name: perf-gw, namespace: nantian-gw}
          spec:
            gatewayClassName: nantian-gw
            listeners:
            - {name: http, port: 80,  protocol: HTTP}
            - {name: grpc, port: 7070, protocol: HTTP, allowedRoutes: {kinds: [{kind: "GRPCRoute"}]}}
          ---
          # Route 1: simple catch-all (exercises fast-path)
          apiVersion: gateway.networking.k8s.io/v1
          kind: HTTPRoute
          metadata: {name: perf-http, namespace: nantian-gw}
          spec:
            parentRefs: [{name: perf-gw, sectionName: http}]
            rules:
            - matches: [{path: {type: PathPrefix, value: /api/v1/users}}]
              backendRefs: [{name: perf-backend, port: 3000}]
            - matches: [{path: {type: PathPrefix, value: /api/v1/orders}}]
              backendRefs: [{name: perf-backend, port: 3000}]
            - matches: [{path: {type: PathPrefix, value: /data}}]
              backendRefs: [{name: perf-backend, port: 3000}]
            - backendRefs: [{name: perf-backend, port: 3000}]
          ---
          apiVersion: gateway.networking.k8s.io/v1
          kind: GRPCRoute
          metadata: {name: perf-grpc, namespace: nantian-gw}
          spec:
            parentRefs: [{name: perf-gw, sectionName: grpc}]
            rules: [{backendRefs: [{name: perf-backend, port: 7070}]}]
          YAML
          kubectl wait --for=condition=ready pod/perf-backend -n nantian-gw --timeout=60s

          for i in $(seq 1 30); do
            S=$(kubectl get gateway perf-gw -n nantian-gw -o json | jq -r '.status.conditions[]? | select(.type=="Programmed") | .status // ""')
            [[ "$S" == "True" ]] && break; sleep 2
          done
          kubectl get svc -n nantian-gw

      - name: Collect baseline metrics
        run: |
          kubectl top pod -n nantian-gw 2>/dev/null || echo "metrics not available"
          : > /tmp/cpu-mem-samples.json

      - name: Run vegeta multi-scenario performance test
        id: vegeta
        run: |
          GW_SVC=$(kubectl get svc -n nantian-gw -o json | jq -r '.items[] | select(.metadata.name | test("perf-gw")) | .metadata.name' | head -1)
          if [[ -z "${GW_SVC}" || "${GW_SVC}" == "null" ]]; then GW_SVC="nantian-gw-perf-gw"; fi
          echo "Target service: ${GW_SVC}"

          : > /tmp/cpu-mem-samples.json
          sample_from_kubectl_top() {
            kubectl top pod -n nantian-gw --no-headers 2>/dev/null |
              awk '/dataplane/ {print $1,$2,$3; exit}' |
              awk 'NF >= 3 {
                cpu=$2; mem=$3
                gsub(/m$/, "", cpu)
                if (mem ~ /Ki$/) { gsub(/Ki$/, "", mem); mem=int(mem / 1024) }
                else if (mem ~ /Mi$/) { gsub(/Mi$/, "", mem) }
                else if (mem ~ /Gi$/) { gsub(/Gi$/, "", mem); mem=int(mem * 1024) }
                print $1, int(cpu), int(mem)
              }'
          }

          dataplane_pod_info() {
            kubectl get pod -n nantian-gw -l app=nantian-gw-dataplane -o json 2>/dev/null |
              jq -r '.items[]? | select(.status.phase == "Running") | [.metadata.name, .spec.nodeName] | @tsv' |
              head -1
          }

          sample_from_kubelet_summary() {
            local info; info=$(dataplane_pod_info)
            [[ -z "${info}" ]] && return 1
            local POD NODE; POD=$(echo "${info}" | awk '{print $1}'); NODE=$(echo "${info}" | awk '{print $2}')
            [[ -z "${POD}" || -z "${NODE}" ]] && return 1
            kubectl get --raw "/api/v1/nodes/${NODE}/proxy/stats/summary" 2>/dev/null |
              jq -r --arg ns "nantian-gw" --arg pod "${POD}" '
                .pods[]? | select(.podRef.namespace == $ns and .podRef.name == $pod) as $p |
                [ $p.podRef.name,
                  ((($p.cpu.usageNanoCores // ([$p.containers[]?.cpu.usageNanoCores//0]|add)//0)/1000000)|floor),
                  ((($p.memory.workingSetBytes // ([$p.containers[]?.memory.workingSetBytes//0]|add)//0)/1048576)|floor) ] | @tsv' |
              head -1
          }

          capture_sample() {
            local m="$1"; local src="kubectl-top"; local s
            s=$(sample_from_kubectl_top || true)
            [[ -z "${s}" ]] && { src="kubelet-summary"; s=$(sample_from_kubelet_summary || true); }
            if [[ -z "${s}" ]]; then echo "t=${m}min no cpu/mem data"; return 0; fi
            read -r POD CPU MEM <<<"${s}"
            [[ "${CPU}" =~ ^[0-9]+$ && "${MEM}" =~ ^[0-9]+$ ]] || { echo "t=${m}min invalid sample: ${s}"; return 0; }
            echo "t=${m}min src=${src} pod=${POD} cpu=${CPU}m mem=${MEM}Mi"
            printf '%s,\n' "$(jq -nc --argjson m "${m}" --arg src "${src}" --arg pod "${POD}" --argjson cpu "${CPU}" --argjson mem "${MEM}" '{minute:$m,source:$src,pod:$pod,cpu_m:$cpu,mem_mi:$mem}')" >> /tmp/cpu-mem-samples.json
          }

          # --- Scenarios: fixed-rate, 60s each, 15s warmup before each ---
          # Wait for gateway listener to be ready before running vegeta.
          # The Gateway resource may be Programmed but the dataplane needs
          # time to reload config and open the listener port.
          echo "Waiting for gateway listener readiness..."
          for attempt in $(seq 1 30); do
            if kubectl run "probe-${attempt}" -n nantian-gw --rm -i --restart=Never \
              --image=busybox:stable -- sh -c "wget -qO- --timeout=2 http://${GW_SVC}/" 2>/dev/null; then
              echo "Gateway listener ready (attempt ${attempt})"
              break
            fi
            echo "  attempt ${attempt}/30: not ready, waiting..."
            sleep 2
          done

          declare -A SCENARIOS=(
            ["simple"]="GET http://${GW_SVC}/"
            ["path-users"]="GET http://${GW_SVC}/api/v1/users"
            ["path-orders"]="GET http://${GW_SVC}/api/v1/orders"
            ["header-data"]="GET http://${GW_SVC}/data\nX-Custom: perf-test"
          )
          declare -A RATES=(["simple"]=3000 ["path-users"]=2000 ["path-orders"]=2000 ["header-data"]=1000)

          : > /tmp/vegeta-results.json
          MINUTE=0
          for scenario in simple path-users path-orders header-data; do
            rate="${RATES[$scenario]}"
            targets="${SCENARIOS[$scenario]}"
            echo "=== Scenario: ${scenario} @ ${rate} RPS ==="

            echo "  Warmup (15s @ ${rate} RPS)..."
            kubectl run "vegeta-warmup-${scenario}" -n nantian-gw \
              --image=peterevans/vegeta:latest --rm --attach --restart=Never -i -q \
              --overrides='{"spec":{"securityContext":{"runAsNonRoot":true,"runAsUser":65532,"seccompProfile":{"type":"RuntimeDefault"}},"containers":[{"name":"v","image":"peterevans/vegeta:latest","securityContext":{"allowPrivilegeEscalation":false,"capabilities":{"drop":["ALL"]}}}],"restartPolicy":"Never"}}' \
              -- sh -c "printf '%b\n' '${targets}' > /tmp/t && vegeta attack -duration=15s -rate=${rate} -max-workers=30 -targets=/tmp/t" \
              >/tmp/warmup.bin 2>/dev/null || true

            echo "  Measurement (60s @ ${rate} RPS)..."
            kubectl run "vegeta-${scenario}" -n nantian-gw \
              --image=peterevans/vegeta:latest --rm --attach --restart=Never -i -q \
              --overrides='{"spec":{"securityContext":{"runAsNonRoot":true,"runAsUser":65532,"seccompProfile":{"type":"RuntimeDefault"}},"containers":[{"name":"v","image":"peterevans/vegeta:latest","securityContext":{"allowPrivilegeEscalation":false,"capabilities":{"drop":["ALL"]}}}],"restartPolicy":"Never"}}' \
              -- sh -c "printf '%b\n' '${targets}' > /tmp/t && (vegeta attack -duration=60s -rate=${rate} -max-workers=30 -targets=/tmp/t | vegeta report -type=json || echo '{\"requests\":0,\"success\":0,\"latencies\":{\"50th\":0,\"95th\":0,\"99th\":0,\"max\":0,\"mean\":0},\"status_codes\":{}}')" \
              >/tmp/report.json 2>/dev/null || true

            if [[ -s /tmp/report.json ]]; then
              if jq -e . /tmp/report.json >/dev/null 2>&1; then
                jq -c --arg scenario "${scenario}" --argjson rate "${rate}" \
                  '{scenario:$scenario,rate:$rate,requests:.requests,success:.success,
                    p50:(.latencies."50th"/1000000|floor),p95:(.latencies."95th"/1000000|floor),
                    p99:(.latencies."99th"/1000000|floor),max:(.latencies.max/1000000|floor),
                    mean:(.latencies.mean/1000000|floor),status_codes:.status_codes}' \
                  /tmp/report.json >> /tmp/vegeta-results.json
                echo "  OK: $(jq -r '"\(.requests) req, p50=\(.latencies."50th"/1000000|floor)ms, p99=\(.latencies."99th"/1000000|floor)ms"' /tmp/report.json)"
              else
                echo "  FAILED: invalid JSON in report"
              fi
            else
              echo "  FAILED: no report"
            fi
            capture_sample "$((MINUTE++))"
            sleep 3
          done

          # Produce clean output
          cp /tmp/vegeta-results.json /tmp/vegeta-clean.json 2>/dev/null || true

      - name: Merge results
        run: |
          set +e
          SAMPLES=$(cat /tmp/cpu-mem-samples.json 2>/dev/null | sed '$ s/,$//')
          SAMPLES="${SAMPLES:-[]}"
          [[ "${SAMPLES}" != "[]" ]] && SAMPLES="[${SAMPLES}]"

          # Build scenario results array from JSONL
          SCENARIOS="[]"
          if [[ -s /tmp/vegeta-clean.json ]]; then
            SCENARIOS=$(jq -s '.' /tmp/vegeta-clean.json 2>/dev/null || echo "[]")
          fi
          # Defensive fallback for all interpolated values
          SCENARIOS="${SCENARIOS:-[]}"

          # Aggregate summary stats across all scenarios
          TOTAL_REQ=$(echo "${SCENARIOS}" | jq '[.[].requests] | add // 0')
          SUCCESS_RATE=$(echo "${SCENARIOS}" | jq '([.[].requests] | add) as $total | if $total > 0 then ([.[].success] | add) / $total else 0 end')
          # Defensive fallback in case jq failed (set +e active)
          TOTAL_REQ="${TOTAL_REQ:-0}"
          SUCCESS_RATE="${SUCCESS_RATE:-0}"

          CPU_AVG=0; CPU_MAX=0; MEM_AVG=0; MEM_MAX=0
          if [[ "${SAMPLES}" != "[]" ]]; then
            CPU_AVG=$(echo "${SAMPLES}" | jq '[.[].cpu_m] | add / length' 2>/dev/null || echo 0)
            CPU_MAX=$(echo "${SAMPLES}" | jq '[.[].cpu_m] | max // 0' 2>/dev/null || echo 0)
            MEM_AVG=$(echo "${SAMPLES}" | jq '[.[].mem_mi] | add / length' 2>/dev/null || echo 0)
            MEM_MAX=$(echo "${SAMPLES}" | jq '[.[].mem_mi] | max // 0' 2>/dev/null || echo 0)
          fi
          # Defensive defaults for all numeric fields
          CPU_AVG="${CPU_AVG:-0}"; CPU_MAX="${CPU_MAX:-0}"
          MEM_AVG="${MEM_AVG:-0}"; MEM_MAX="${MEM_MAX:-0}"

          mkdir -p dist
          cat > dist/performance.json <<JSON
          {
            "tool": "vegeta",
            "target": "dataplane via Gateway (multi-scenario fixed-rate)",
            "methodology": "4 scenarios at fixed rates: simple(3000rps), path-users(2000rps), path-orders(2000rps), header-data(1000rps). 15s warmup + 60s measurement per scenario.",
            "duration_sec": 300,
            "total_requests": ${TOTAL_REQ},
            "success_rate": ${SUCCESS_RATE},
            "cpu": {
              "avg_m": ${CPU_AVG},
              "max_m": ${CPU_MAX}
            },
            "memory": {
              "avg_mi": ${MEM_AVG},
              "max_mi": ${MEM_MAX}
            },
            "scenarios": ${SCENARIOS},
            "cpu_mem_samples": ${SAMPLES}
          }
          JSON

          cat dist/performance.json

          if [[ -s /tmp/vegeta-clean.json ]]; then
            cp /tmp/vegeta-clean.json dist/vegeta-raw.json
          fi

      - name: Upload performance artifact
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: performance-results
          path: |
            dist/performance.json
            dist/vegeta-raw.json
          if-no-files-found: warn

      - name: Cleanup
        if: always()
        run: command -v kind >/dev/null 2>&1 && kind delete cluster --name "$CLUSTER_NAME" || true

  commit-results:
    name: Commit Results
    needs: [conformance, performance]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10

      - name: Download artifacts
        uses: actions/download-artifact@37930b1c2abaa49bbe596cd826c3c89aef350131
        with:
          path: artifacts

      - name: Generate nightly results
        run: |
          DATE=$(date -u +%Y-%m-%d)
          RESULTS_DIR="results/nightly/${DATE}"
          mkdir -p "${RESULTS_DIR}"

          echo "=== Downloaded artifact tree ==="
          find artifacts -type f 2>/dev/null || echo "(no artifacts directory)"

          # Collect result files by name from wherever download-artifact nested them,
          # instead of assuming a fixed artifacts/<name>/ layout.
          find_first() { find artifacts -type f -name "$1" 2>/dev/null | head -1 || true; }

          for name in run.log report.yaml performance.json vegeta-raw.json; do
            src=$(find_first "${name}")
            if [[ -n "${src}" ]]; then
              cp "${src}" "${RESULTS_DIR}/${name}"
              echo "Collected ${name} from ${src}"
            fi
          done

          raw_files=""
          append_raw_file() {
            local file="$1"
            local description="$2"
            if [[ -f "${RESULTS_DIR}/${file}" ]]; then
              raw_files="${raw_files}- \`${file}\` — ${description}"$'\n'
            fi
          }
          append_raw_file "report.yaml" "Gateway API conformance report"
          append_raw_file "run.log" "Full conformance test output"
          append_raw_file "performance.json" "Vegeta dataplane load test summary"
          append_raw_file "vegeta-raw.json" "Raw vegeta latency distribution"
          if [[ -z "${raw_files}" ]]; then
            raw_files="- No raw data files were produced"$'\n'
          fi

          CONFORMANCE="no data"
          if [[ -f "${RESULTS_DIR}/run.log" ]]; then
            PASSED=$(grep -c -- '--- PASS:' "${RESULTS_DIR}/run.log" 2>/dev/null | tr -d '\n' || echo "0")
            FAILED=$(grep -cE '^\s+--- FAIL:' "${RESULTS_DIR}/run.log" 2>/dev/null | tr -d '\n' || echo "0")
            SKIPPED=$(grep -c -- '--- SKIP:' "${RESULTS_DIR}/run.log" 2>/dev/null | tr -d '\n' || echo "0")
            CONFORMANCE="${PASSED} passed, ${FAILED} failed, ${SKIPPED} skipped"
          fi

          PERF="no data"
          if [[ -f "${RESULTS_DIR}/performance.json" ]]; then
            TOTAL=$(jq -r '.total_requests // "N/A"' "${RESULTS_DIR}/performance.json")
            SCENARIO_TABLE=""
            while IFS= read -r row; do
              s=$(echo "$row" | jq -r '.scenario')
              r=$(echo "$row" | jq -r '.rate')
              p50=$(echo "$row" | jq -r '.p50')
              p99=$(echo "$row" | jq -r '.p99')
              req=$(echo "$row" | jq -r '.requests')
              [[ "${s}" != "null" ]] && SCENARIO_TABLE="${SCENARIO_TABLE}| ${s} | ${r}/s | ${p50}ms | ${p99}ms | ${req} |"$'\n'
            done < <(jq -c '.scenarios[]?' "${RESULTS_DIR}/performance.json" 2>/dev/null)
            if [[ -n "${SCENARIO_TABLE}" ]]; then
              PERF="${TOTAL} total requests

          | Scenario | Rate | p50 | p99 | Requests |
          |----------|------|-----|-----|----------|
          ${SCENARIO_TABLE}"
            else
              PERF="${TOTAL} total requests"
            fi
          fi

          cat > "${RESULTS_DIR}/summary.md" <<EOF
          # Nightly Test Results — ${DATE}

          | Test | Result |
          |------|--------|
          | Conformance | ${CONFORMANCE} |
          | Performance | ${PERF} |

          Images tested:
          - Control Plane: ${CONTROLPLANE_IMAGE}
          - Data Plane: ${DATAPLANE_IMAGE}

          ## Raw Data Files
          ${raw_files}
          EOF

          cat "${RESULTS_DIR}/summary.md"

      - name: Check performance regression
        if: ${{ always() }}
        continue-on-error: true
        run: RESULTS_DIR=results/nightly bash scripts/check-performance-regression.sh

      - name: Commit and push results (summary only, raw logs archived)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/nightly/
          if git diff --staged --quiet; then
            echo "No changes to commit."
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          git commit -m "chore(results): record nightly conformance + performance for ${DATE}"
          git push

      - name: Upload raw logs as artifacts
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: nightly-raw-logs
          path: |
            results/nightly/*/run.log
            results/nightly/*/vegeta-raw.json
          retention-days: 90
          if-no-files-found: warn

      - name: Cleanup old results
        run: RETENTION_DAYS=30 bash scripts/cleanup-old-runs.sh

      - name: Commit cleanup
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/nightly/
          if git diff --staged --quiet; then
            echo "No cleanup changes."
            exit 0
          fi
          git commit -m "chore(results): cleanup run.log files older than 30 days"
          git push
