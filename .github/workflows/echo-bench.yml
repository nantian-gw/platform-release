name: Echo Bench

on:
  push:
    paths:
      - 'bench/echo-server/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: bench/echo-server
          push: true
          tags: ghcr.io/nantian-gw/echo-bench:latest
