name: validate-release

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: make setup
      - name: Run unit tests
        run: make test

  release-validation:
    runs-on: ubuntu-latest
    needs:
      - unit-tests
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0
      - name: Detect changed release manifests
        id: changed-manifests
        shell: bash
        run: |
          shopt -s nullglob
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            base_sha="${{ github.event.pull_request.base.sha }}"
            head_sha="${{ github.event.pull_request.head.sha }}"
          else
            base_sha="${{ github.event.before }}"
            head_sha="${{ github.sha }}"
          fi

          if [[ -z "${base_sha}" || "${base_sha}" =~ ^0+$ ]]; then
            mapfile -t manifests < <(git diff-tree --no-commit-id --name-only -r "${head_sha}" -- 'releases/*/manifest.yaml')
          else
            mapfile -t manifests < <(git diff --name-only "${base_sha}" "${head_sha}" -- 'releases/*/manifest.yaml')
          fi

          if [[ "${#manifests[@]}" -eq 0 ]]; then
            {
              echo "has_manifests=false"
              echo "manifest_list<<EOF"
              echo "EOF"
            } >>"${GITHUB_OUTPUT}"
            echo "No release manifests changed."
            exit 0
          fi

          {
            echo "has_manifests=true"
            echo "manifest_list<<EOF"
            printf '%s\n' "${manifests[@]}"
            echo "EOF"
          } >>"${GITHUB_OUTPUT}"
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        if: steps.changed-manifests.outputs.has_manifests == 'true'
        with:
          python-version: "3.12"
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16
        if: steps.changed-manifests.outputs.has_manifests == 'true'
        with:
          go-version: "1.26.3"
      - uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8
        if: steps.changed-manifests.outputs.has_manifests == 'true'
        with:
          toolchain: "1.96.0"
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae
        if: steps.changed-manifests.outputs.has_manifests == 'true'
        with:
          workspaces: "dataplane -> target"
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444
        if: steps.changed-manifests.outputs.has_manifests == 'true'
        with:
          node-version: "26"
      - uses: azure/setup-helm@bf6a7d304bc2fdb57e0331155b7ebf2c504acf0a
        if: steps.changed-manifests.outputs.has_manifests == 'true'
      - uses: azure/setup-kubectl@c0c8b32d33a5244f1e5947304550403b63930415
        if: steps.changed-manifests.outputs.has_manifests == 'true'
        with:
          version: "v1.34.2"
      - name: Install kind
        if: steps.changed-manifests.outputs.has_manifests == 'true'
        shell: bash
        run: |
          kind_version="v0.24.0"
          case "$(uname -m)" in
            x86_64|amd64)
              kind_arch="amd64"
              ;;
            aarch64|arm64)
              kind_arch="arm64"
              ;;
            *)
              echo "Unsupported runner architecture: $(uname -m)" >&2
              exit 1
              ;;
          esac

          kind_url="https://github.com/kubernetes-sigs/kind/releases/download/${kind_version}/kind-linux-${kind_arch}"
          checksum_url="${kind_url}.sha256sum"

          curl -fsSL -o /tmp/kind "${kind_url}"
          curl -fsSL -o /tmp/kind.sha256sum "${checksum_url}"
          expected_hash="$(cut -d' ' -f1 /tmp/kind.sha256sum)"
          echo "${expected_hash}  /tmp/kind" | sha256sum --check
          sudo install -m 0755 /tmp/kind /usr/local/bin/kind
          kind --version
      - uses: imranismail/setup-kustomize@2ba527d4d055ab63514ba50a99456fc35684947f
        if: steps.changed-manifests.outputs.has_manifests == 'true'
      - name: Install dependencies
        if: steps.changed-manifests.outputs.has_manifests == 'true'
        run: make setup
      - name: Validate changed release manifests
        if: steps.changed-manifests.outputs.has_manifests == 'true'
        shell: bash
        run: |
          mapfile -t manifests <<<"${{ steps.changed-manifests.outputs.manifest_list }}"

          for manifest in "${manifests[@]}"; do
            version="$(basename "$(dirname "${manifest}")")"
            summary="results/${version}/summary.yaml"
            workspace=".work/${version}"

            mkdir -p "$(dirname "${summary}")" "${workspace}"

            ./scripts/run-validation.sh "${manifest}" "${summary}" "${workspace}"
            ./scripts/collect-results.sh "${summary}" "results/${version}/test-matrix.md" "results/${version}/conformance.md" "results/${version}/artifacts.yaml"
          done
      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f
        with:
          if-no-files-found: ignore
          name: platform-release-results
          path: |
            results/
            .work/
