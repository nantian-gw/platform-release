name: validate-release

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: make setup
      - name: Run unit tests
        run: make test

  release-validation:
    runs-on: ubuntu-latest
    needs:
      - unit-tests
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.3"
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: "1.96.0"
          components: rustfmt,clippy
      - uses: actions/setup-node@v5
        with:
          node-version: "26"
      - uses: azure/setup-helm@v4
      - uses: azure/setup-kubectl@v4
        with:
          version: "v1.34.2"
      - uses: engineerd/setup-kind@v0.6.2
      - uses: imranismail/setup-kustomize@v2
      - name: Install dependencies
        run: make setup
      - name: Validate release manifests
        shell: bash
        run: |
          shopt -s nullglob
          for manifest in releases/*/manifest.yaml; do
            version="$(basename "$(dirname "${manifest}")")"
            summary="results/${version}/summary.yaml"
            workspace=".work/${version}"

            mkdir -p "$(dirname "${summary}")" "${workspace}"

            ./scripts/run-validation.sh "${manifest}" "${summary}" "${workspace}"
            ./scripts/collect-results.sh "${summary}" "results/${version}/test-matrix.md" "results/${version}/conformance.md" "results/${version}/artifacts.yaml"
          done
      - name: Upload validation artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: platform-release-results
          path: |
            results/
            .work/
